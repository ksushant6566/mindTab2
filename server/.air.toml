root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api/"
  entrypoint = "./tmp/api"
  delay = 1000
  exclude_dir = ["tmp", "migrations"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "sql", "yaml"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
