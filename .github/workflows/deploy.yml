name: Deploy Production

on:
  push:
    branches: ["main"]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/mindtab-v2-api
  LANDING_IMAGE: ghcr.io/${{ github.repository_owner }}/mindtab-v2-landing

jobs:
  build-api:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API/web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/arm64
          push: true
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            VITE_API_URL=https://api.mindtab.in
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-landing:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.landing
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:latest
            ${{ env.LANDING_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-landing]
    steps:
      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            APP_DIR=/opt/mindtab
            API_IMAGE="${{ env.API_IMAGE }}:${{ github.sha }}"
            LANDING_IMAGE="${{ env.LANDING_IMAGE }}:${{ github.sha }}"
            CURRENT_USER="$(id -un)"
            CURRENT_GROUP="$(id -gn)"
            CERT_NAME=mindtab.in
            CERT_DIR=/etc/letsencrypt/live/$CERT_NAME
            REQUIRED_TLS_DOMAINS="mindtab.in www.mindtab.in app.mindtab.in api.mindtab.in"

            sudo mkdir -p "$APP_DIR/env"
            sudo chown -R "$CURRENT_USER:$CURRENT_GROUP" "$APP_DIR"

            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | sudo docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            fi

            cat > "$APP_DIR/env/api.env" <<'ENV'
            PORT=8080
            STATIC_DIR=/static
            STORAGE_LOCAL_PATH=/data/mindtab/media
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            API_PUBLIC_URL=https://api.mindtab.in
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            JINA_API_KEY=${{ secrets.JINA_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}
            REDDIT_USER_AGENT=${{ vars.REDDIT_USER_AGENT }}
            GEMINI_MODEL=${{ vars.GEMINI_MODEL }}
            OPENAI_EMBEDDING_MODEL=${{ vars.OPENAI_EMBEDDING_MODEL }}
            EMBEDDING_DIMENSIONS=${{ vars.EMBEDDING_DIMENSIONS }}
            WORKER_CONCURRENCY=${{ vars.WORKER_CONCURRENCY }}
            WORKER_DEQUEUE_TIMEOUT=${{ vars.WORKER_DEQUEUE_TIMEOUT }}
            WORKER_RETRY_POLL_INTERVAL=${{ vars.WORKER_RETRY_POLL_INTERVAL }}
            WORKER_SHUTDOWN_TIMEOUT=${{ vars.WORKER_SHUTDOWN_TIMEOUT }}
            MAX_FILE_SIZE_MB=${{ vars.MAX_FILE_SIZE_MB }}
            YOUTUBE_MAX_DURATION_SEC=${{ vars.YOUTUBE_MAX_DURATION_SEC }}
            YOUTUBE_VIDEO_QUALITY=${{ vars.YOUTUBE_VIDEO_QUALITY }}
            YOUTUBE_FRAMES_PER_MIN_CAP=${{ vars.YOUTUBE_FRAMES_PER_MIN_CAP }}
            ENV
            chmod 600 "$APP_DIR/env/api.env"

            required_env_keys="DATABASE_URL JWT_SECRET GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET API_PUBLIC_URL RESEND_API_KEY"
            for key in $required_env_keys; do
              if ! grep -Eq "^${key}=.+" "$APP_DIR/env/api.env"; then
                echo "Missing required API env: $key" >&2
                exit 1
              fi
            done

            write_http_nginx_config() {
              cat > "$APP_DIR/mindtab.nginx.conf" <<'NGINX'
            server {
              listen 80;
              server_name api.mindtab.in;

              client_max_body_size 64m;

              location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }

            server {
              listen 80;
              server_name app.mindtab.in;

              client_max_body_size 64m;

              location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }

            server {
              listen 80;
              server_name mindtab.in www.mindtab.in;

              location / {
                proxy_pass http://127.0.0.1:8081;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
            NGINX
            }

            write_https_nginx_config() {
              cat > "$APP_DIR/mindtab.nginx.conf" <<'NGINX'
            server {
              listen 80;
              server_name api.mindtab.in app.mindtab.in mindtab.in www.mindtab.in;

              location /.well-known/acme-challenge/ {
                root /var/www/html;
              }

              location / {
                return 301 https://$host$request_uri;
              }
            }

            server {
              listen 443 ssl http2;
              server_name api.mindtab.in;

              ssl_certificate /etc/letsencrypt/live/mindtab.in/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/mindtab.in/privkey.pem;

              client_max_body_size 64m;

              location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }

            server {
              listen 443 ssl http2;
              server_name app.mindtab.in;

              ssl_certificate /etc/letsencrypt/live/mindtab.in/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/mindtab.in/privkey.pem;

              client_max_body_size 64m;

              location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }

            server {
              listen 443 ssl http2;
              server_name mindtab.in www.mindtab.in;

              ssl_certificate /etc/letsencrypt/live/mindtab.in/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/mindtab.in/privkey.pem;

              location / {
                proxy_pass http://127.0.0.1:8081;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
            NGINX
            }

            cert_covers_required_domains() {
              sudo test -f "$CERT_DIR/fullchain.pem" && sudo test -f "$CERT_DIR/privkey.pem" || return 1
              cert_names="$(sudo openssl x509 -in "$CERT_DIR/fullchain.pem" -noout -ext subjectAltName 2>/dev/null || true)"
              for domain in $REQUIRED_TLS_DOMAINS; do
                echo "$cert_names" | grep -q "DNS:$domain\\>" || return 1
              done
            }

            if cert_covers_required_domains; then
              write_https_nginx_config
            else
              write_http_nginx_config
            fi

            sudo cp "$APP_DIR/mindtab.nginx.conf" /etc/nginx/sites-available/mindtab
            sudo ln -sf /etc/nginx/sites-available/mindtab /etc/nginx/sites-enabled/mindtab

            MANAGED_NGINX_SITE="$(readlink -f /etc/nginx/sites-available/mindtab)"
            for site in /etc/nginx/sites-enabled/*; do
              sudo test -e "$site" || continue
              if [ "$(readlink -f "$site")" != "$MANAGED_NGINX_SITE" ] && sudo grep -Eq 'server_name[[:space:]][^;]*(api\.mindtab\.in|app\.mindtab\.in|mindtab\.in|www\.mindtab\.in)' "$site"; then
                sudo rm -f "$site"
              fi
            done

            sudo nginx -t

            sudo docker pull "$API_IMAGE"
            sudo docker pull "$LANDING_IMAGE"
            sudo docker volume create mindtab_media >/dev/null

            sudo docker run --rm \
              --env-file "$APP_DIR/env/api.env" \
              "$API_IMAGE" \
              sh -lc 'migrate -path /migrations -database "$DATABASE_URL" up'

            sudo docker rm -f mindtab-api mindtab-landing 2>/dev/null || true

            sudo docker run -d \
              --name mindtab-api \
              --restart unless-stopped \
              --env-file "$APP_DIR/env/api.env" \
              -p 127.0.0.1:8080:8080 \
              -v mindtab_media:/data/mindtab/media \
              "$API_IMAGE"

            sudo docker run -d \
              --name mindtab-landing \
              --restart unless-stopped \
              -p 127.0.0.1:8081:80 \
              "$LANDING_IMAGE"

            sudo docker image prune -f
            sudo systemctl reload nginx

            if ! cert_covers_required_domains && [ -n "${{ secrets.LETSENCRYPT_EMAIL }}" ] && command -v certbot >/dev/null 2>&1; then
              sudo certbot --nginx \
                --non-interactive \
                --agree-tos \
                --expand \
                --email "${{ secrets.LETSENCRYPT_EMAIL }}" \
                --cert-name "$CERT_NAME" \
                -d mindtab.in \
                -d www.mindtab.in \
                -d app.mindtab.in \
                -d api.mindtab.in

              if cert_covers_required_domains; then
                write_https_nginx_config
                sudo cp "$APP_DIR/mindtab.nginx.conf" /etc/nginx/sites-available/mindtab
                sudo nginx -t
                sudo systemctl reload nginx
              else
                echo "Certbot completed, but $CERT_DIR/fullchain.pem still does not cover all required domains: $REQUIRED_TLS_DOMAINS" >&2
                exit 1
              fi
            fi
