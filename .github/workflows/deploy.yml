name: Deploy Production

on:
  push:
    branches: ["main"]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/mindtab-v2-api
  LANDING_IMAGE: ghcr.io/${{ github.repository_owner }}/mindtab-v2-landing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API/web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/arm64
          push: true
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.landing
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:latest
            ${{ env.LANDING_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            APP_DIR=/opt/mindtab
            API_IMAGE="${{ env.API_IMAGE }}:${{ github.sha }}"
            LANDING_IMAGE="${{ env.LANDING_IMAGE }}:${{ github.sha }}"
            CURRENT_USER="$(id -un)"
            CURRENT_GROUP="$(id -gn)"
            CERT_NAME=mindtab.in
            CERT_DIR=/etc/letsencrypt/live/$CERT_NAME

            sudo mkdir -p "$APP_DIR/env"
            sudo chown -R "$CURRENT_USER:$CURRENT_GROUP" "$APP_DIR"

            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | sudo docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            fi

            cat > "$APP_DIR/env/api.env" <<'ENV'
            PORT=8080
            STATIC_DIR=/static
            STORAGE_LOCAL_PATH=/data/mindtab/media
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            JINA_API_KEY=${{ secrets.JINA_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}
            REDDIT_USER_AGENT=${{ vars.REDDIT_USER_AGENT }}
            GEMINI_MODEL=${{ vars.GEMINI_MODEL }}
            OPENAI_EMBEDDING_MODEL=${{ vars.OPENAI_EMBEDDING_MODEL }}
            EMBEDDING_DIMENSIONS=${{ vars.EMBEDDING_DIMENSIONS }}
            WORKER_CONCURRENCY=${{ vars.WORKER_CONCURRENCY }}
            WORKER_SHUTDOWN_TIMEOUT=${{ vars.WORKER_SHUTDOWN_TIMEOUT }}
            MAX_FILE_SIZE_MB=${{ vars.MAX_FILE_SIZE_MB }}
            YOUTUBE_MAX_DURATION_SEC=${{ vars.YOUTUBE_MAX_DURATION_SEC }}
            YOUTUBE_VIDEO_QUALITY=${{ vars.YOUTUBE_VIDEO_QUALITY }}
            YOUTUBE_FRAMES_PER_MIN_CAP=${{ vars.YOUTUBE_FRAMES_PER_MIN_CAP }}
            ENV
            chmod 600 "$APP_DIR/env/api.env"

            cat > "$APP_DIR/docker-compose.yml" <<COMPOSE
            services:
              api:
                image: ${API_IMAGE}
                restart: unless-stopped
                env_file:
                  - ${APP_DIR}/env/api.env
                ports:
                  - "127.0.0.1:8080:8080"
                volumes:
                  - mindtab_media:/data/mindtab/media

              landing:
                image: ${LANDING_IMAGE}
                restart: unless-stopped
                ports:
                  - "127.0.0.1:8081:80"

            volumes:
              mindtab_media:
            COMPOSE

            write_http_nginx_config() {
              cat > "$APP_DIR/mindtab.nginx.conf" <<'NGINX'
            server {
              listen 80;
              server_name api.mindtab.in;

              client_max_body_size 64m;

              location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }

            server {
              listen 80;
              server_name app.mindtab.in;

              client_max_body_size 64m;

              location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }

            server {
              listen 80;
              server_name mindtab.in www.mindtab.in;

              location / {
                proxy_pass http://127.0.0.1:8081;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
            NGINX
            }

            write_https_nginx_config() {
              cat > "$APP_DIR/mindtab.nginx.conf" <<'NGINX'
            server {
              listen 80;
              server_name api.mindtab.in app.mindtab.in mindtab.in www.mindtab.in;

              location /.well-known/acme-challenge/ {
                root /var/www/html;
              }

              location / {
                return 301 https://$host$request_uri;
              }
            }

            server {
              listen 443 ssl http2;
              server_name api.mindtab.in;

              ssl_certificate /etc/letsencrypt/live/mindtab.in/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/mindtab.in/privkey.pem;

              client_max_body_size 64m;

              location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }

            server {
              listen 443 ssl http2;
              server_name app.mindtab.in;

              ssl_certificate /etc/letsencrypt/live/mindtab.in/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/mindtab.in/privkey.pem;

              client_max_body_size 64m;

              location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }

            server {
              listen 443 ssl http2;
              server_name mindtab.in www.mindtab.in;

              ssl_certificate /etc/letsencrypt/live/mindtab.in/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/mindtab.in/privkey.pem;

              location / {
                proxy_pass http://127.0.0.1:8081;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
            NGINX
            }

            if sudo test -f "$CERT_DIR/fullchain.pem" && sudo test -f "$CERT_DIR/privkey.pem"; then
              write_https_nginx_config
            else
              write_http_nginx_config
            fi

            sudo cp "$APP_DIR/mindtab.nginx.conf" /etc/nginx/sites-available/mindtab
            sudo ln -sf /etc/nginx/sites-available/mindtab /etc/nginx/sites-enabled/mindtab
            sudo nginx -t

            sudo docker compose -f "$APP_DIR/docker-compose.yml" pull
            sudo docker compose -f "$APP_DIR/docker-compose.yml" run --rm --no-deps api sh -lc 'migrate -path /migrations -database "$DATABASE_URL" up'
            sudo docker compose -f "$APP_DIR/docker-compose.yml" up -d --remove-orphans
            sudo docker image prune -f
            sudo systemctl reload nginx

            if ! sudo test -f "$CERT_DIR/fullchain.pem" && [ -n "${{ secrets.LETSENCRYPT_EMAIL }}" ] && command -v certbot >/dev/null 2>&1; then
              sudo certbot --nginx \
                --non-interactive \
                --agree-tos \
                --email "${{ secrets.LETSENCRYPT_EMAIL }}" \
                --cert-name "$CERT_NAME" \
                -d mindtab.in \
                -d www.mindtab.in \
                -d app.mindtab.in \
                -d api.mindtab.in

              write_https_nginx_config
              sudo cp "$APP_DIR/mindtab.nginx.conf" /etc/nginx/sites-available/mindtab
              sudo nginx -t
              sudo systemctl reload nginx
            fi
