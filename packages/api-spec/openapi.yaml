openapi: 3.0.3
info:
  title: MindTab API
  description: API for MindTab — task tracking and micro-notes platform.
  version: 0.1.0
  contact:
    name: MindTab
    url: https://mindtab.in

servers:
  - url: /
    description: API v1

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User profile management
  - name: Tasks
    description: Task CRUD and batch operations
  - name: Notes
    description: Note CRUD
  - name: Projects
    description: Project CRUD and stats
  - name: Activity
    description: Activity heatmap
  - name: Search
    description: Full-text search
  - name: Sync
    description: Bookmark and reading list sync
  - name: Saves
    description: Saved content (articles and images) with AI processing
  - name: Media
    description: Authenticated media file serving
  - name: Chat
    description: Conversations, messages, and chat attachments

paths:
  # ─── Auth ───────────────────────────────────────────────────────────────
  /auth/google:
    post:
      operationId: authGoogle
      tags: [Auth]
      summary: Exchange Google ID token for JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken:
                  type: string
      responses:
        "200":
          description: Authentication successful
          headers:
            Set-Cookie:
              description: httpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid ID token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/google/start:
    get:
      operationId: authGoogleStart
      tags: [Auth]
      summary: Start Google OAuth in a top-level browser tab
      security: []
      parameters:
        - name: return_to
          in: query
          required: false
          schema:
            type: string
            format: uri
          description: Web callback URL to return to after the API completes Google OAuth.
      responses:
        "302":
          description: Redirects to Google OAuth
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              description: Temporary OAuth state cookies
              schema:
                type: string
        "400":
          description: Invalid return URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/google/callback:
    get:
      operationId: authGoogleCallback
      tags: [Auth]
      summary: Complete Google OAuth and set the web refresh cookie
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirects to the web callback route with status or error
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              description: Sets the httpOnly refresh token cookie on success and clears temporary OAuth cookies
              schema:
                type: string

  /auth/refresh:
    post:
      operationId: authRefresh
      tags: [Auth]
      summary: Refresh access token using httpOnly cookie
      security: []
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                required: [accessToken]
                properties:
                  accessToken:
                    type: string
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      operationId: authLogout
      tags: [Auth]
      summary: Logout and revoke the refresh token
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Mobile refresh token. Web clients use the httpOnly cookie.
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              description: Clears the httpOnly refresh token cookie for web clients
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/email/signup:
    post:
      operationId: authEmailSignup
      tags: [Auth]
      summary: Sign up with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
      responses:
        "200":
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/email/verify:
    post:
      operationId: authEmailVerify
      tags: [Auth]
      summary: Verify email with 6-digit code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
      responses:
        "200":
          description: Email verified, tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileAuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /auth/email/signin:
    post:
      operationId: authEmailSignin
      tags: [Auth]
      summary: Sign in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileAuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/email/forgot-password:
    post:
      operationId: authEmailForgotPassword
      tags: [Auth]
      summary: Request password reset code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset email sent (if account exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/email/reset-password:
    post:
      operationId: authEmailResetPassword
      tags: [Auth]
      summary: Reset password with code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, newPassword]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  # ─── Users ──────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getCurrentUser
      tags: [Users]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateCurrentUser
      tags: [Users]
      summary: Update current user preferences or onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                onboardingCompleted:
                  type: boolean
                theme:
                  type: string
                  enum: [system, dark, light]
                uiFont:
                  type: string
                  enum: [geist, inter, system, sf-pro, helvetica, avenir, ibm-plex, roboto, segoe]
                codeFont:
                  type: string
                  enum: [system-mono, geist-mono, sf-mono, jetbrains, fira-code, cascadia, menlo, monaco]
                appearanceTemplate:
                  type: string
                  enum: [absolutely, ayu, catppuccin, codex, dracula, everforest, github, graphite, gruvbox, linear, lobster, material, matrix, midnight, monokai, night-owl, nord, notion, one, oscurange, paper, proof, rose-pine, sentry, solarized, temple, tokyo-night, vscode-plus]
                accentColor:
                  type: string
                  pattern: "^#[0-9A-Fa-f]{6}$"
                backgroundColor:
                  type: string
                  pattern: "^#[0-9A-Fa-f]{6}$"
                foregroundColor:
                  type: string
                  pattern: "^#[0-9A-Fa-f]{6}$"
                contrast:
                  type: integer
                  minimum: 0
                  maximum: 100
                fontSize:
                  type: integer
                  minimum: 12
                  maximum: 20
                radius:
                  type: integer
                  minimum: 0
                  maximum: 20
                weekStartDay:
                  type: string
                  enum: [monday, sunday, saturday]
                timeFormat:
                  type: string
                  enum: [12h, 24h]
                timeZone:
                  type: string
                  maxLength: 64
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{id}:
    get:
      operationId: getUserById
      tags: [Users]
      summary: Get public user profile
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            maxLength: 255
      responses:
        "200":
          description: Public user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Tasks ──────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [Tasks]
      summary: List tasks
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            format: uuid
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createTask
      tags: [Tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [Tasks]
      summary: Get a single task
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Task with project summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateTask
      tags: [Tasks]
      summary: Update a task
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTask
      tags: [Tasks]
      summary: Soft-delete a task
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "204":
          description: Task deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /tasks/count:
    get:
      operationId: countTasks
      tags: [Tasks]
      summary: Count tasks
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            format: uuid
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Task count
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tasks/unassigned:
    get:
      operationId: listUnassignedTasks
      tags: [Tasks]
      summary: List tasks without a project
      responses:
        "200":
          description: Unassigned tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tasks/positions:
    patch:
      operationId: updateTaskPositions
      tags: [Tasks]
      summary: Batch update task positions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tasks, sequence]
              properties:
                tasks:
                  type: array
                  items:
                    type: object
                    required: [id, position]
                    properties:
                      id:
                        type: string
                        format: uuid
                      position:
                        type: integer
                      status:
                        $ref: "#/components/schemas/TaskStatus"
                sequence:
                  type: integer
      responses:
        "200":
          description: Positions updated
          content:
            application/json:
              schema:
                type: object
                required: [success, sequence]
                properties:
                  success:
                    type: boolean
                  sequence:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tasks/archive-completed:
    post:
      operationId: archiveCompletedTasks
      tags: [Tasks]
      summary: Archive all completed tasks
      responses:
        "200":
          description: Completed tasks archived
          content:
            application/json:
              schema:
                type: object
                required: [success, count]
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Notes ───────────────────────────────────────────────────────────
  /notes:
    get:
      operationId: listNotes
      tags: [Notes]
      summary: List notes
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createNote
      tags: [Notes]
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteCreate"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Duplicate note title
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notes/{id}:
    get:
      operationId: getNote
      tags: [Notes]
      summary: Get a single note
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Note with project summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateNote
      tags: [Notes]
      summary: Update a note
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdate"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Duplicate note title
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteNote
      tags: [Notes]
      summary: Hard-delete a note
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "204":
          description: Note deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /notes/count:
    get:
      operationId: countNotes
      tags: [Notes]
      summary: Count notes
      responses:
        "200":
          description: Note count
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Projects ───────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [Projects]
      summary: List projects with nested tasks
      parameters:
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ProjectStatus"
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createProject
      tags: [Projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [Projects]
      summary: Get a project with nested tasks
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProject
      tags: [Projects]
      summary: Update a project
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteProject
      tags: [Projects]
      summary: Soft-delete a project (cascades to tasks and notes)
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Project deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/stats:
    get:
      operationId: getProjectStats
      tags: [Projects]
      summary: List projects with task and note counts
      responses:
        "200":
          description: Projects with stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectWithStats"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /projects/{id}/archive:
    post:
      operationId: archiveProject
      tags: [Projects]
      summary: Archive a project and its contents
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Archived project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Activity ───────────────────────────────────────────────────────────
  /activity:
    get:
      operationId: getActivity
      tags: [Activity]
      summary: Activity heatmap for the last 365 days
      security: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
            maxLength: 255
      responses:
        "200":
          description: Activity heatmap data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityDay"
        "400":
          description: Missing userId parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Search ─────────────────────────────────────────────────────────────
  /search/tasks:
    get:
      operationId: searchTasks
      tags: [Search]
      summary: Search tasks by title (max 5 results)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Matching tasks
          content:
            application/json:
              schema:
                type: array
                maxItems: 5
                items:
                  $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /search/notes:
    get:
      operationId: searchNotes
      tags: [Search]
      summary: Search notes by title (max 5 results)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Matching notes
          content:
            application/json:
              schema:
                type: array
                maxItems: 5
                items:
                  $ref: "#/components/schemas/Note"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Sync ───────────────────────────────────────────────────────────────
  /sync/bookmarks:
    post:
      operationId: syncBookmarks
      tags: [Sync]
      summary: Sync browser bookmarks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncRequest"
      responses:
        "200":
          description: Bookmarks synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /sync/reading-lists:
    post:
      operationId: syncReadingLists
      tags: [Sync]
      summary: Sync reading lists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncRequest"
      responses:
        "200":
          description: Reading lists synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Saves ──────────────────────────────────────────────────────────────
  /saves:
    post:
      operationId: createSave
      tags: [Saves]
      summary: Save a URL-backed item, image, audio file, or video file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaveURLRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateSaveMultipartRequest"
      responses:
        "201":
          description: Save created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveCreateResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      operationId: listSaves
      tags: [Saves]
      summary: List saved content items
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of items to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of items to skip
      responses:
        "200":
          description: List of saved content items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaveListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /saves/search:
    post:
      operationId: searchSaves
      tags: [Saves]
      summary: Semantic search over saved content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Natural language search query
                limit:
                  type: integer
                  description: Maximum number of results to return
      responses:
        "200":
          description: Search results ordered by semantic similarity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaveSearchResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /saves/{id}:
    get:
      operationId: getSave
      tags: [Saves]
      summary: Get a single saved content item
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200":
          description: Full saved content item including extracted text and visual description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteSave
      tags: [Saves]
      summary: Delete a saved content item
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "204":
          description: Save deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /saves/{id}/commit:
    post:
      operationId: commitSave
      tags: [Saves]
      summary: Flip a draft save to committed (and enqueue if deferred)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Optional override title for the save
      responses:
        "200":
          description: Save committed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveCreateResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Media ──────────────────────────────────────────────────────────────
  /media/{path}:
    get:
      operationId: getMedia
      tags: [Media]
      summary: Serve a stored media file behind authentication
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Media file path
      responses:
        "200":
          description: Media file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            image/*:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Chat ───────────────────────────────────────────────────────────────
  /conversations:
    get:
      operationId: listConversations
      tags: [Chat]
      summary: List conversations for the current user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of items to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of items to skip
      responses:
        "200":
          description: Paginated list of conversations
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConversationListItem"
                  total:
                    type: integer
                    description: Total number of conversations
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ai/providers:
    get:
      operationId: listAIProviders
      tags: [AI]
      summary: List model providers and their user-specific configuration state
      responses:
        "200":
          description: Available providers and models
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIProviderConfiguration"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ai/providers/{provider}:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AIProviderId"
    put:
      operationId: saveAIProviderCredential
      tags: [AI]
      summary: Encrypt and save a provider API key for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
                  minLength: 8
                  maxLength: 4096
                  writeOnly: true
      responses:
        "200":
          description: Provider configured
          content:
            application/json:
              schema:
                type: object
                required: [provider, configured, key_hint]
                properties:
                  provider:
                    $ref: "#/components/schemas/AIProviderId"
                  configured:
                    type: boolean
                  key_hint:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteAIProviderCredential
      tags: [AI]
      summary: Remove a saved provider API key
      responses:
        "204":
          description: Provider credential removed
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /conversations/{id}/messages:
    get:
      operationId: getMessages
      tags: [Chat]
      summary: List messages in a conversation
      parameters:
        - $ref: "#/components/parameters/UuidId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of messages to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of messages to skip
      responses:
        "200":
          description: Paginated list of messages
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MessageItem"
                  total:
                    type: integer
                    description: Total number of messages in the conversation
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /conversations/{id}:
    delete:
      operationId: deleteConversation
      tags: [Chat]
      summary: Soft-delete a conversation
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "204":
          description: Conversation deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /chat/attachments:
    post:
      operationId: uploadChatAttachment
      tags: [Chat]
      summary: Upload a file attachment for use in a chat message
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (jpeg, png, webp, or pdf)
      responses:
        "201":
          description: Attachment uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentUploadResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  # ─── Security ─────────────────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─── Parameters ───────────────────────────────────────────────────────
  parameters:
    UuidId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ─── Reusable Responses ──────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  # ─── Schemas ──────────────────────────────────────────────────────────
  schemas:
    # ── Enums ──────────────────────────────────────────────────────────
    TaskStatus:
      type: string
      enum: [pending, in_progress, completed, archived]

    TaskPriority:
      type: string
      enum: [priority_1, priority_2, priority_3, priority_4]

    TaskImpact:
      type: string
      enum: [low, medium, high]

    NoteType:
      type: string
      enum: [article, book, video, podcast, website]

    ProjectStatus:
      type: string
      enum: [active, paused, completed, archived]

    # ── Error ──────────────────────────────────────────────────────────
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: string
          description: Machine-readable error code

    # ── Auth ───────────────────────────────────────────────────────────
    AuthResponse:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    MobileAuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── User ───────────────────────────────────────────────────────────
    User:
      type: object
      required:
        - id
        - email
        - onboardingCompleted
        - theme
        - uiFont
        - codeFont
        - appearanceTemplate
        - accentColor
        - backgroundColor
        - foregroundColor
        - contrast
        - fontSize
        - radius
        - weekStartDay
        - timeFormat
        - timeZone
        - createdAt
      properties:
        id:
          type: string
          maxLength: 255
          description: User ID (varchar, not UUID)
        name:
          type: string
          nullable: true
        email:
          type: string
          format: email
        image:
          type: string
          nullable: true
        onboardingCompleted:
          type: boolean
          default: false
        theme:
          type: string
          enum: [system, dark, light]
          default: system
        uiFont:
          type: string
          enum: [geist, inter, system, sf-pro, helvetica, avenir, ibm-plex, roboto, segoe]
          default: geist
        codeFont:
          type: string
          enum: [system-mono, geist-mono, sf-mono, jetbrains, fira-code, cascadia, menlo, monaco]
          default: system-mono
        appearanceTemplate:
          type: string
          enum: [absolutely, ayu, catppuccin, codex, dracula, everforest, github, graphite, gruvbox, linear, lobster, material, matrix, midnight, monokai, night-owl, nord, notion, one, oscurange, paper, proof, rose-pine, sentry, solarized, temple, tokyo-night, vscode-plus]
          default: codex
        accentColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          default: "#0169CC"
        backgroundColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          default: "#111111"
        foregroundColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          default: "#FCFCFC"
        contrast:
          type: integer
          minimum: 0
          maximum: 100
          default: 60
        fontSize:
          type: integer
          minimum: 12
          maximum: 20
          default: 14
        radius:
          type: integer
          minimum: 0
          maximum: 20
          default: 7
        weekStartDay:
          type: string
          enum: [monday, sunday, saturday]
          default: monday
        timeFormat:
          type: string
          enum: [12h, 24h]
          default: 12h
        timeZone:
          type: string
          maxLength: 64
          default: auto
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    # ── Task ───────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, status, priority, impact, position, createdAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        impact:
          $ref: "#/components/schemas/TaskImpact"
        position:
          type: integer
        projectId:
          type: string
          format: uuid
          nullable: true
        project:
          $ref: "#/components/schemas/ProjectSummary"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        scheduledStartAt:
          type: string
          format: date-time
          nullable: true
          description: Schedule start. Must be provided together with scheduledEndAt.
        scheduledEndAt:
          type: string
          format: date-time
          nullable: true
          description: Schedule end. Must be provided together with scheduledStartAt and be later than it.

    TaskCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 256
        description:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        impact:
          $ref: "#/components/schemas/TaskImpact"
        position:
          type: integer
        projectId:
          type: string
          format: uuid
          nullable: true
        completedAt:
          type: string
          format: date-time
        scheduledStartAt:
          type: string
          format: date-time
          nullable: true
          description: Schedule start. Must be provided together with scheduledEndAt.
        scheduledEndAt:
          type: string
          format: date-time
          nullable: true
          description: Schedule end. Must be provided together with scheduledStartAt and be later than it.

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 256
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        impact:
          $ref: "#/components/schemas/TaskImpact"
        position:
          type: integer
        projectId:
          type: string
          format: uuid
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        scheduledStartAt:
          type: string
          format: date-time
          nullable: true
          description: Schedule start. Must be provided together with scheduledEndAt.
        scheduledEndAt:
          type: string
          format: date-time
          nullable: true
          description: Schedule end. Must be provided together with scheduledStartAt and be later than it.

    # ── Note ────────────────────────────────────────────────────────
    Note:
      type: object
      required: [id, title, content, type, source, createdAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        type:
          $ref: "#/components/schemas/NoteType"
        source:
          type: string
        projectId:
          type: string
          format: uuid
          nullable: true
        project:
          $ref: "#/components/schemas/ProjectSummary"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true

    NoteCreate:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 256
        content:
          type: string
          minLength: 1
        projectId:
          type: string
          format: uuid
          nullable: true

    NoteUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 256
        content:
          type: string
          minLength: 1
        type:
          $ref: "#/components/schemas/NoteType"
        source:
          type: string
        projectId:
          type: string
          format: uuid
          nullable: true

    # ── Project ────────────────────────────────────────────────────────
    ProjectSummary:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/ProjectStatus"

    Project:
      type: object
      required: [id, status, startDate, createdBy, lastUpdatedBy, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/ProjectStatus"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        createdBy:
          type: string
          maxLength: 255
        lastUpdatedBy:
          type: string
          maxLength: 255
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    ProjectCreate:
      type: object
      required: [name, startDate]
      properties:
        name:
          type: string
          maxLength: 256
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 256
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/ProjectStatus"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true

    ProjectWithStats:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          required: [taskStats, noteStats]
          properties:
            taskStats:
              type: object
              required: [total, pending, inProgress, completed]
              properties:
                total:
                  type: integer
                pending:
                  type: integer
                inProgress:
                  type: integer
                completed:
                  type: integer
            noteStats:
              type: object
              required: [total]
              properties:
                total:
                  type: integer

    # ── Activity ───────────────────────────────────────────────────────
    ActivityDay:
      type: object
      required: [date, count, details]
      properties:
        date:
          type: string
          format: date
        count:
          type: integer
        details:
          type: object
          required:
            - tasksCreated
            - tasksCompleted
            - notesCreated
            - notesUpdated
          properties:
            tasksCreated:
              type: integer
            tasksCompleted:
              type: integer
            notesCreated:
              type: integer
            notesUpdated:
              type: integer

    # ── Sync ───────────────────────────────────────────────────────────
    SyncRequest:
      type: object
      required: [items, metadata]
      properties:
        items:
          type: array
          items:
            type: object
            required: [title, url]
            properties:
              id:
                type: string
              title:
                type: string
              url:
                type: string
                format: uri
              dateAdded:
                type: string
                format: date-time
        metadata:
          type: object
          required: [source, count]
          properties:
            source:
              type: string
            count:
              type: integer

    SyncResponse:
      type: object
      required: [success, message, itemCount]
      properties:
        success:
          type: boolean
        message:
          type: string
        itemCount:
          type: integer

    # ── Saves ───────────────────────────────────────────────────────────
    SaveSourceType:
      type: string
      enum: [article, image, youtube, audio, instagram_reel, x_post, reddit_post]
      description: Type of saved content

    SaveProcessingStatus:
      type: string
      enum: [deferred, pending, processing, completed, failed]
      description: Current processing status of the saved content

    SaveCommitStatus:
      type: string
      enum: [draft, committed]
      description: Whether the save has been committed by the user

    CreateSaveURLRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: URL of the article, X post, Reddit post, YouTube video, or Instagram Reel to save
        content:
          type: string
          description: Pre-extracted text content (skips server-side extraction when provided)
        title:
          type: string
          description: Source title (e.g., tweet author, page title)
        auto_commit:
          type: boolean
          default: true
          description: If false, save is created in draft state and requires explicit commit
        start_processing:
          type: boolean
          default: true
          description: If false, processing is deferred until explicitly started

    CreateSaveMultipartRequest:
      type: object
      properties:
        image:
          type: string
          format: binary
          description: Image file to save
        audio:
          type: string
          format: binary
          description: Audio file to save
        video:
          type: string
          format: binary
          description: Video file to save
        source_url:
          type: string
          format: uri
          description: Original content URL for uploaded media, when available
          example: https://www.instagram.com/reel/C1234567890/
        source:
          type: string
          enum: [recorder, file_picker, share_extension, app]
          description: How the audio was captured
        auto_commit:
          type: boolean
          default: true
          description: If false, save is created in draft state and requires explicit commit
        start_processing:
          type: boolean
          default: true
          description: If false, processing is deferred until explicitly started. Ignored for audio uploads; audio eager/deferred behavior is derived from server-probed duration.

    SaveCreateResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
          description: ID of the newly created save
        status:
          type: string
          description: Legacy initial processing status returned by JSON URL saves
        commit_status:
          $ref: "#/components/schemas/SaveCommitStatus"
        processing_status:
          $ref: "#/components/schemas/SaveProcessingStatus"
        media_url:
          type: string
          nullable: true
          description: Authenticated URL to access the media file
        duration_seconds:
          type: integer
          nullable: true
          description: Server-probed duration for audio/video media in seconds

    SaveListItem:
      type: object
      required: [id, user_id, source_type, tags, key_topics, commit_status, processing_status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        source_url:
          type: string
          format: uri
          nullable: true
          description: Original URL for URL-backed saves
        source_type:
          $ref: "#/components/schemas/SaveSourceType"
        source_title:
          type: string
          nullable: true
          description: Extracted or inferred title
        source_thumbnail_url:
          type: string
          format: uri
          nullable: true
          description: Thumbnail URL from the source, when available
        summary:
          type: string
          nullable: true
          description: AI-generated summary
        tags:
          type: array
          items:
            type: string
          description: AI-generated tags
        key_topics:
          type: array
          items:
            type: string
          description: Key topics extracted from content
        media_key:
          type: string
          nullable: true
          description: Storage key for associated media file
        media_url:
          type: string
          nullable: true
          description: Authenticated URL to access the media file
        duration_seconds:
          type: integer
          nullable: true
          description: Duration of the audio or video in seconds
        video_thumbnail_url:
          type: string
          format: uri
          nullable: true
          description: Thumbnail URL for saved video content
        video_channel:
          type: string
          nullable: true
          description: Channel or creator name for video content
        commit_status:
          $ref: "#/components/schemas/SaveCommitStatus"
        processing_status:
          $ref: "#/components/schemas/SaveProcessingStatus"
        processing_error:
          type: string
          nullable: true
          description: Error message if processing failed
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SaveDetail:
      allOf:
        - $ref: "#/components/schemas/SaveListItem"
        - type: object
          properties:
            extracted_text:
              type: string
              nullable: true
              description: Full text extracted from the content
            visual_description:
              type: string
              nullable: true
              description: AI-generated visual description for image saves
            source_metadata:
              type: object
              nullable: true
              additionalProperties: true
              description: Source-specific metadata captured by first-class processors
            summary_provider:
              type: string
              nullable: true
              description: Provider that generated the summary
            embedding_provider:
              type: string
              nullable: true
              description: Provider that generated the embedding
            embedding_model:
              type: string
              nullable: true
              description: Model that generated the embedding
            transcript_source:
              type: string
              nullable: true
              description: Source of the transcript for audio or video content

    SaveSearchResult:
      type: object
      required: [id, source_type, similarity, created_at]
      properties:
        id:
          type: string
          format: uuid
        source_url:
          type: string
          format: uri
          nullable: true
        source_type:
          $ref: "#/components/schemas/SaveSourceType"
        source_title:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        tags:
          type: array
          nullable: true
          items:
            type: string
        media_key:
          type: string
          nullable: true
        similarity:
          type: number
          format: float
          description: Cosine similarity score (0-1)
        created_at:
          type: string
          format: date-time

    # ── Chat ────────────────────────────────────────────────────────────
    ConversationListItem:
      type: object
      required: [id, provider, model, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
          description: Conversation title (auto-generated or user-set)
        provider:
          $ref: "#/components/schemas/AIProviderId"
        model:
          type: string
          description: Provider-specific model identifier used by this conversation
        project_id:
          type: string
          format: uuid
          nullable: true
          description: Optional project context for the conversation
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MessageItem:
      type: object
      required: [id, role, content, created_at]
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, tool]
          description: Author role of the message
        content:
          type: string
          description: Text content of the message
        attachments:
          nullable: true
          description: JSON array of attachment references
        tool_calls:
          nullable: true
          description: JSON array of tool call objects (assistant messages only)
        tool_call_id:
          type: string
          nullable: true
          description: ID of the tool call this message is responding to (tool messages only)
        created_at:
          type: string
          format: date-time

    AIProviderId:
      type: string
      enum: [openai, anthropic, gemini, openrouter]

    AIModelOption:
      type: object
      required: [id, name, description]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string

    AIProviderConfiguration:
      type: object
      required: [id, name, configured, managed, models]
      properties:
        id:
          $ref: "#/components/schemas/AIProviderId"
        name:
          type: string
        configured:
          type: boolean
        managed:
          type: boolean
          description: True when MindTab supplies the credential for this provider
        key_hint:
          type: string
          nullable: true
          description: Masked last four characters of the user's saved key
        models:
          type: array
          items:
            $ref: "#/components/schemas/AIModelOption"

    AttachmentUploadResponse:
      type: object
      required: [media_key, filename, mime_type, size]
      properties:
        media_key:
          type: string
          description: "Storage key for the uploaded file (format: chat/{userID}/{uuid}/{filename})"
        filename:
          type: string
          description: Original filename
        mime_type:
          type: string
          description: Detected MIME type of the uploaded file
        size:
          type: integer
          format: int64
          description: File size in bytes
